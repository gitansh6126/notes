<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes Portal</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/spa.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script>
    const COURSE_MAP = {
      mad2: { name: 'MAD2 (Modern Application Development II)', shortName: 'MAD2', folder: 'MAD2 (Modern Application Development II)', icon: 'ph-laptop', accent: '#8b5cf6' },
      mlt:  { name: 'MLT (Machine Learning Techniques)', shortName: 'MLT', folder: 'MLT (Machine Learning Techniques)', icon: 'ph-brain', accent: '#10b981' },
      bdm:  { name: 'BDM (Business Data Management)', shortName: 'BDM', folder: 'BDM', icon: 'ph-database', accent: '#f59e0b' },
    };

    (function() {
      var params = new URLSearchParams(window.location.search);
      var courseId = params.get('course');
      var meta = COURSE_MAP[courseId];
      if (!meta) {
        document.write('<div style="padding:2rem;text-align:center;font-family:sans-serif;"><h1>Invalid Course</h1><p>Please select a course from the portal.</p><a href="../index.html">Go to Portal</a></div>');
        return;
      }
      window.COURSE_ID = courseId;
      window.COURSE_NAME = meta.shortName;
      window.COURSE_FOLDER = meta.folder;

      window.__configReady = fetch('../assets/config/' + courseId + '.json')
        .then(function(r) { if (!r.ok) throw new Error('Failed to load config'); return r.json(); })
        .then(function(data) {
          window.COURSE_STRUCTURES = {};
          window.COURSE_STRUCTURES[data.courseId] = data.weeks;
          window.COURSE_META = {};
          window.COURSE_META[data.courseId] = { name: data.courseName };
        })
        .catch(function() {
          return new Promise(function(resolve) {
            var script = document.createElement('script');
            script.src = '../assets/js/config.js';
            script.onload = resolve;
            document.body.appendChild(script);
          });
        });
    })();
  </script>
</head>
<body class="spa-body">
  <div class="spa-container">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="spa-sidebar" id="sidebar">
      <div class="sidebar-brand">
        <a href="../index.html" class="sidebar-brand-title">
          <i class="ph ph-books"></i>
          <span id="sidebarBrand">Notes Portal</span>
        </a>
        <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Close menu">
          <i class="ph ph-x"></i>
        </button>
      </div>
      <div class="sidebar-menu" id="sidebarMenu"></div>
    </aside>

    <button class="sidebar-edge-toggle" id="sidebarEdgeToggle" aria-label="Toggle sidebar">
      <i class="ph ph-caret-left"></i>
    </button>

    <main class="spa-main">
      <header class="main-header">
        <div class="header-left">
          <button class="sidebar-toggle-btn" id="sidebarOpenBtn" aria-label="Open menu">
            <i class="ph ph-list"></i>
          </button>
          <div class="current-lecture-info">
            <div class="current-week-label" id="currentWeekLabel">Notes Portal</div>
            <div class="current-lecture-title" id="currentLectureTitle">Select a Lecture</div>
          </div>
        </div>
        <div class="header-right">
          <div class="header-search" id="headerSearch">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" class="header-search-input" id="searchInput" placeholder="Search..." autocomplete="off">
          </div>
          <button class="icon-btn" id="prevLectureBtn" aria-label="Previous Lecture" title="Previous Lecture">
            <i class="ph ph-arrow-left"></i>
          </button>
          <button class="icon-btn" id="nextLectureBtn" aria-label="Next Lecture" title="Next Lecture">
            <i class="ph ph-arrow-right"></i>
          </button>
          <a href="../index.html" class="icon-btn" aria-label="Home Portal">
            <i class="ph ph-house"></i>
          </a>
          <button class="icon-btn" id="themeToggle" aria-label="Toggle theme">
            <i class="ph ph-moon" id="themeIcon"></i>
          </button>
        </div>
      </header>

      <div class="viewer-container">
        <div class="viewer-loader" id="viewerLoader">
          <div class="spinner"></div>
        </div>

        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon" id="welcomeIcon">
            <i class="ph ph-book-open"></i>
          </div>
          <h1 class="welcome-title" id="welcomeTitle">Course Notes</h1>
          <p class="welcome-subtitle">Select any lecture from the sidebar dropdowns to begin studying.</p>
        </div>

        <iframe class="viewer-iframe" id="viewerIframe" title="Lecture Notes Content"></iframe>
      </div>
    </main>
  </div>

  <div class="search-results" id="searchResults">
    <div class="search-empty">Type to search across all lectures...</div>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var courseId = params.get('course');
      var meta = COURSE_MAP[courseId];
      if (!meta) return;

      document.getElementById('sidebarBrand').textContent = meta.shortName + ' Portal';
      document.getElementById('welcomeTitle').textContent = meta.name;
      document.getElementById('currentWeekLabel').textContent = meta.shortName + ' Portal';
      var icon = document.querySelector('#welcomeIcon i');
      if (icon) icon.className = 'ph ' + meta.icon;
      document.title = meta.shortName + ' Notes Portal';
    })();
  </script>
  <script src="../assets/js/spa.js"></script>
</body>
</html>
